<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">mapwidgets icon</title>
  <desc id="desc">Layered map tiles with a location pin, route line, and compass point on a transparent background.</desc>
  <defs>
    <linearGradient id="back-sheet" x1="18" y1="83" x2="107" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="front-sheet" x1="21" y1="22" x2="110" y2="103" gradientUnits="userSpaceOnUse">
